<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="https://blog.246612.xyz/apple-work.png" />
    <meta
      name="keywords"
      content="learning,notes,documentation,study,education,knowledge base,ai"
    />
    <meta name="description" content="Deep-AI-Notes ｜ AI知识库" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover"
    />
    <title>
    Deep-AI-Notes-謝懿Shine©'AI知识库
    </title>

    <!-- Themes (light + dark) -->
    <link
      rel="stylesheet"
      data-style-group="themeable"
      href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="stylesheet"
      data-style-group="themeable"
      href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css"
      media="(prefers-color-scheme: dark)"
    />

    <!-- Custom Styles -->
    <style>
      /* 一级标题使用主题色 */
      .markdown-section h1 {
        color: var(--theme-color);
        opacity: 0.8;
      }

      /* 链接使用主题色 */
      .markdown-section a {
        color: var(--theme-color);
        opacity: 0.8;
      }

      /* 链接悬停效果 */
      .markdown-section a:hover {
        color: var(--theme-color);
        opacity: 1;
        text-decoration: underline;
      }

      /* 侧边栏链接悬停效果 */
      .sidebar .sidebar-nav a:hover {
        color: var(--theme-color);
      }

      /* 渲染侧边栏第一级标题(不管有没有链接)使用主题色 */
      .sidebar .sidebar-nav > ul > li {
        color: var(--theme-color);
        opacity: 0.8;
        font-weight: 600;
      }
    </style>

    <!-- Math rendering (KaTeX) - CSS should be in head -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css" />
  </head>
  <body>
    <div id="app"></div>

    <script>
      // Docsify configuration
      window.$docsify = {
        name: 'TOC 目录🫧',
        nameLink: '#/',
        //repo: 'https://github.com/FuTseYi', // 如果需要显示仓库地址，请取消注释
        loadSidebar: true,
        loadNavbar: true,
        auto2top: true,
        executeScript: true,
        maxLevel: 3,
        sidebarDisplayLevel: 0,
        subMaxLevel: 3,
        alias: {
          '/.*/_sidebar.md': '/_sidebar.md',
          '/.*/_navbar.md': '/_navbar.md',
        },
        pagination: {
          previousText: 'Previous',
          nextText: 'Next',
        },
        search: {
          paths: 'auto',
          placeholder: 'Search',
          noData: 'No results!',
          depth: 6,
        },
        count: {
          countable: true,
          position: 'top',
          margin: '10px',
          float: 'left',
          fontsize: '0.9em',
          color: 'rgb(90,90,90)',
          language: 'english',
          isExpected: true,
        },
        themeable: {
          readyTransition: true,
          responsiveTables: true,
        },
      };
    </script>

    <!-- Core Docsify -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/external-script.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>

    <!-- Plugins -->
    <!-- docsify-themeable 应该在 docsify 核心之后、其他插件之前加载 -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-count@latest/dist/countable.min.js"></script>

    <!-- Code highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>

    <!-- Math rendering (KaTeX) -->
    <!-- 注意：JS 加载顺序很重要，必须按照 katex.js -> marked -> docsify-katex 的顺序 -->
    <!-- CSS 已在 head 中加载 -->
    <script src="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>

    <!-- Mermaid diagram support -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@latest/dist/docsify-mermaid.js"></script>
  </body>
</html>
